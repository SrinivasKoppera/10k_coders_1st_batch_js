<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forms</title>
  </head>
  <body>
    <form action="/submit" method="GET">
      <div>
        <label for="input1">Name</label>
        <input
          type="text"
          placeholder="EX: Srinivas"
          id="input1"
          name="Name"
          value=""
          required
        />
      </div>
      <div>
        <label for="input2">Email</label>
        <input
          type="email"
          placeholder="Please enter your email"
          id="input2"
          name="Email"
          value=""
          required
        />
      </div>
      <div>
        <label for="input3">Password</label>
        <input
          type="password"
          placeholder="Please enter your password"
          id="input3"
          name="Password"
          value=""
          required
        />
      </div>
      <div>
        <label for="input4">Upload File</label>
        <input type="file" id="input4" name="File" required />
      </div>
      <div>
        <label for="input5">Enter a Number</label>
        <input
          type="number"
          id="input5"
          name="Number"
          required
          min="2"
          max="10"
        />
      </div>
      <div>
        <label for="input6">Enter a Number</label>
        <input
          type="range"
          id="input6"
          name="Number"
          required
          step="3"
          min="1"
          max="100"
        />
      </div>
      <div>
        <label for="input7">Terms</label>
        <input type="checkbox" id="input7" name="Terms" required />
      </div>
      <div>
        <label for="input8">Gender</label>
        <div>
          <label for="input8">Male </label>
          <input type="radio" id="input8" name="Gender" value="Male" required />
        </div>
        <div>
          <label for="input9">Female </label>
          <input
            type="radio"
            id="input9"
            name="Gender"
            value="Female"
            required
          />
        </div>
        <div>
          <label for="input10">Transgender </label>
          <input
            type="radio"
            id="input10"
            name="Gender"
            value="Transgender"
            required
          />
        </div>
      </div>
      <div>
        <label for="input11">Date</label>
        <input type="date" id="input11" name="Date" required />
      </div>
      <div>
        <label for="input11">Time</label>
        <input type="time" id="input11" name="Time" required />
      </div>
      <div>
        <label for="input12">Color</label>
        <input type="color" id="input12" name="Color" required />
      </div>
      <div>
        <label for="input13">Website</label>
        <input type="url" id="input13" name="Website" required />
      </div>
      <div>
        <label for="input14">Search</label>
        <input type="search" id="input14" name="Search" required />
      </div>
      <div>
        <label for="input15">Reset</label>
        <input type="reset" id="input15" name="Reset" />
      </div>
      <div>
        <label for="input16">Options</label>
        <select id="input16" name="Options" required>
          <optgroup label="Group 1">
            <option value="Option 1">Option 1</option>
            <option value="Option 2">Option 2</option>
            <option value="Option 3" selected>Option 3</option>
          </optgroup>
          <optgroup label="Group 2">
            <option value="Option 4">Option 4</option>
            <option value="Option 5">Option 5</option>
            <option value="Option 6">Option 6</option>
          </optgroup>
        </select>
      </div>
      <div>
        <textarea
          id="input17"
          name="Message"
          placeholder="Please enter your message"
          required
          cols="30"
          rows="10"
          maxlength="10"
        ></textarea>
      </div>
      <input type="submit" value="Submit" />
    </form>
  </body>
</html>
